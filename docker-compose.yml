services:
  minio:
    image: minio/minio:latest
    ports:
      - "9000:9000"      # API
      - "9001:9001"      # Console
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 3s
      timeout: 30s
      retries: 10
    # minioadmin / minioadmin でログイン可能
    # URL: http://localhost:9000/morivis-data/assets/...

  # バケット作成とデータ同期
  minio-init:
    image: minio/mc
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin;
      mc mb --ignore-existing local/morivis-data;
      mc anonymous set public local/morivis-data;
      mc mirror --overwrite /host-data/assets local/morivis-data/assets;
      mc mirror --overwrite /host-data/large local/morivis-data/large;
      echo 'MinIO sync completed';
      "
    volumes:
      - ./data:/host-data:ro

volumes:
  minio-data: